apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmpostor
  labels:
    app.kubernetes.io/name: llmpostor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llmpostor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llmpostor
    spec:
      containers:
        - name: llmpostor
          image: llmpostor:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
